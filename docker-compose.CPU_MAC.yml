services:
  search:
    build:
      context: .
      dockerfile: Dockerfile_CPU_MAC
    ports:
      - "8811:8811"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8811/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3080:3080"
    depends_on:
      search:
        condition: service_healthy
    restart: unless-stopped