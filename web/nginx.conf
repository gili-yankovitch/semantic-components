server {
    listen 3080;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://search:8811/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
